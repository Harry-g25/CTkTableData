<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Loading state and wide table example</title>
  <desc id="desc">A wide data table with horizontal scrolling and a loading state overlay.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdfa"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="104" y="82" width="1072" height="556" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="144" y="132" width="990" height="396" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <rect x="144" y="132" width="990" height="58" rx="12" fill="#edf3fb"/>
  <g fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <text x="176" y="168">ID</text>
    <text x="276" y="168">Name</text>
    <text x="520" y="168">Email</text>
    <text x="796" y="168">Company</text>
    <text x="1030" y="168">Status</text>
  </g>
  <g stroke="#d9e1ec">
    <path d="M244 132v396M492 132v396M768 132v396M1004 132v396"/>
    <path d="M144 190h990M144 248h990M144 306h990M144 364h990M144 422h990"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15">
    <rect x="144" y="190" width="990" height="58" fill="#ffffff"/>
    <text x="176" y="226" fill="#475569">1</text>
    <text x="276" y="226" fill="#172033" font-weight="600">Northwind Components</text>
    <text x="520" y="226" fill="#475569">ops@northwind.example</text>
    <text x="796" y="226" fill="#475569">Northwind</text>
    <rect x="1030" y="206" width="76" height="28" rx="14" fill="#d1fae5"/>
    <text x="1053" y="226" fill="#047857" font-size="14" font-weight="700">Open</text>
    <rect x="144" y="248" width="990" height="58" fill="#f8fafc"/>
    <text x="176" y="284" fill="#475569">2</text>
    <text x="276" y="284" fill="#172033" font-weight="600">Meridian Foods</text>
    <text x="520" y="284" fill="#475569">finance@meridian.example</text>
    <text x="796" y="284" fill="#475569">Meridian</text>
    <rect x="1030" y="264" width="78" height="28" rx="14" fill="#e5e7eb"/>
    <text x="1050" y="284" fill="#475569" font-size="14" font-weight="700">Closed</text>
  </g>
  <rect x="144" y="546" width="990" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="144" y="546" width="310" height="10" rx="5" fill="#2563eb"/>
  <rect x="144" y="132" width="990" height="396" rx="12" fill="#ffffff" opacity=".78"/>
  <text x="640" y="326" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">Loading records...</text>
  <rect x="560" y="354" width="160" height="8" rx="4" fill="#dbeafe"/>
  <rect x="560" y="354" width="86" height="8" rx="4" fill="#2563eb"/>
  <text x="144" y="604" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">Use set_loading(True) during refreshes and horizontal_scroll=True for wide datasets.</text>
</svg>
