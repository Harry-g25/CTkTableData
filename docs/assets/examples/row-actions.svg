<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Row actions example</title>
  <desc id="desc">A data table with view and delete action buttons inside each row.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="118" y="88" width="1044" height="544" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="154" y="146" width="972" height="360" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <rect x="154" y="146" width="972" height="58" rx="12" fill="#edf3fb"/>
  <g fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <text x="190" y="182">ID</text>
    <text x="316" y="182">Name</text>
    <text x="818" y="182">Actions</text>
  </g>
  <g stroke="#d9e1ec">
    <path d="M276 146v360M770 146v360"/>
    <path d="M154 204h972M154 262h972M154 320h972M154 378h972M154 436h972"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="154" y="204" width="972" height="58" fill="#ffffff"/>
    <text x="190" y="240" fill="#475569">1</text>
    <text x="316" y="240" fill="#172033" font-weight="600">Northwind Components</text>
    <rect x="818" y="219" width="74" height="30" rx="7" fill="#dbeafe" stroke="#bfdbfe"/>
    <text x="842" y="240" fill="#1d4ed8" font-size="14" font-weight="700">View</text>
    <rect x="904" y="219" width="82" height="30" rx="7" fill="#fee2e2" stroke="#fecaca"/>
    <text x="925" y="240" fill="#991b1b" font-size="14" font-weight="700">Delete</text>
    <rect x="154" y="262" width="972" height="58" fill="#f8fafc"/>
    <text x="190" y="298" fill="#475569">2</text>
    <text x="316" y="298" fill="#172033" font-weight="600">Meridian Foods</text>
    <rect x="818" y="277" width="74" height="30" rx="7" fill="#dbeafe" stroke="#bfdbfe"/>
    <text x="842" y="298" fill="#1d4ed8" font-size="14" font-weight="700">View</text>
    <rect x="904" y="277" width="82" height="30" rx="7" fill="#fee2e2" stroke="#fecaca"/>
    <text x="925" y="298" fill="#991b1b" font-size="14" font-weight="700">Delete</text>
    <rect x="154" y="320" width="972" height="58" fill="#ffffff"/>
    <text x="190" y="356" fill="#475569">3</text>
    <text x="316" y="356" fill="#172033" font-weight="600">Blue Ridge Logistics</text>
    <rect x="818" y="335" width="74" height="30" rx="7" fill="#dbeafe" stroke="#bfdbfe"/>
    <text x="842" y="356" fill="#1d4ed8" font-size="14" font-weight="700">View</text>
    <rect x="904" y="335" width="82" height="30" rx="7" fill="#fee2e2" stroke="#fecaca"/>
    <text x="925" y="356" fill="#991b1b" font-size="14" font-weight="700">Delete</text>
  </g>
  <rect x="792" y="524" width="334" height="58" rx="10" fill="#172033"/>
  <text x="818" y="559" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">on_action_click(row, "delete")</text>
  <path d="M948 506v18" stroke="#172033" stroke-width="3" stroke-linecap="round"/>
  <text x="154" y="584" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">Action clicks fire action callbacks without also firing row or cell callbacks.</text>
</svg>
