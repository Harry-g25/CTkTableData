<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Master detail panel example</title>
  <desc id="desc">A table next to a detail panel showing selected row metadata.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0f9ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="94" y="82" width="1092" height="556" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="132" y="132" width="660" height="394" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <rect x="132" y="132" width="660" height="58" rx="12" fill="#edf3fb"/>
  <text x="168" y="168" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Customer</text>
  <text x="542" y="168" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Owner</text>
  <path d="M500 132v394" stroke="#d9e1ec"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="132" y="190" width="660" height="58" fill="#ffffff"/>
    <text x="168" y="226" fill="#172033" font-weight="600">Northwind Components</text>
    <text x="542" y="226" fill="#475569">Amelia</text>
    <rect x="132" y="248" width="660" height="58" fill="#dbeafe"/>
    <text x="168" y="284" fill="#1e3a8a" font-weight="700">Meridian Foods</text>
    <text x="542" y="284" fill="#1e40af" font-weight="700">Noah</text>
    <rect x="132" y="306" width="660" height="58" fill="#ffffff"/>
    <text x="168" y="342" fill="#172033" font-weight="600">Blue Ridge Logistics</text>
    <text x="542" y="342" fill="#475569">Grace</text>
  </g>
  <g stroke="#d9e1ec">
    <path d="M132 190h660M132 248h660M132 306h660M132 364h660"/>
  </g>
  <rect x="828" y="132" width="318" height="394" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <text x="860" y="178" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Selected Row</text>
  <rect x="860" y="208" width="246" height="1" fill="#d9e1ec"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15">
    <text x="860" y="250" fill="#64748b" font-weight="700">source_index</text>
    <text x="1060" y="250" fill="#172033" font-weight="800" text-anchor="end">1</text>
    <text x="860" y="292" fill="#64748b" font-weight="700">view_index</text>
    <text x="1060" y="292" fill="#172033" font-weight="800" text-anchor="end">1</text>
    <text x="860" y="334" fill="#64748b" font-weight="700">column_key</text>
    <text x="1060" y="334" fill="#172033" font-weight="800" text-anchor="end">name</text>
    <text x="860" y="386" fill="#64748b" font-weight="700">row["name"]</text>
    <text x="860" y="418" fill="#172033" font-weight="800">Meridian Foods</text>
  </g>
  <text x="132" y="584" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">Event callbacks expose row data plus source and visible indices for detail panels.</text>
</svg>
