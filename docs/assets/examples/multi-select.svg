<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Multi-select bulk delete example</title>
  <desc id="desc">A table with multiple selected rows and a delete selected toolbar button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="110" y="78" width="1060" height="568" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="146" y="128" width="178" height="42" rx="8" fill="#ef4444"/>
  <text x="174" y="155" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800">Delete selected</text>
  <rect x="146" y="198" width="988" height="360" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <rect x="146" y="198" width="988" height="58" rx="12" fill="#edf3fb"/>
  <g fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    <text x="184" y="234">ID</text>
    <text x="296" y="234">Customer</text>
    <text x="724" y="234">Status</text>
  </g>
  <g stroke="#d9e1ec">
    <path d="M260 198v360M684 198v360"/>
    <path d="M146 256h988M146 314h988M146 372h988M146 430h988M146 488h988"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="146" y="256" width="988" height="58" fill="#dbeafe"/>
    <text x="184" y="292" fill="#1e40af" font-weight="700">1</text>
    <text x="296" y="292" fill="#1e3a8a" font-weight="700">Northwind Components</text>
    <rect x="724" y="272" width="76" height="28" rx="14" fill="#bfdbfe"/>
    <text x="747" y="292" fill="#1d4ed8" font-size="14" font-weight="700">Open</text>
    <rect x="146" y="314" width="988" height="58" fill="#ffffff"/>
    <text x="184" y="350" fill="#475569">2</text>
    <text x="296" y="350" fill="#172033" font-weight="600">Meridian Foods</text>
    <rect x="724" y="330" width="78" height="28" rx="14" fill="#e5e7eb"/>
    <text x="744" y="350" fill="#475569" font-size="14" font-weight="700">Closed</text>
    <rect x="146" y="372" width="988" height="58" fill="#dbeafe"/>
    <text x="184" y="408" fill="#1e40af" font-weight="700">3</text>
    <text x="296" y="408" fill="#1e3a8a" font-weight="700">Blue Ridge Logistics</text>
    <rect x="724" y="388" width="106" height="28" rx="14" fill="#bfdbfe"/>
    <text x="744" y="408" fill="#1d4ed8" font-size="14" font-weight="700">In Review</text>
    <rect x="146" y="430" width="988" height="58" fill="#f8fafc"/>
    <text x="184" y="466" fill="#475569">4</text>
    <text x="296" y="466" fill="#172033" font-weight="600">Aster Digital</text>
    <rect x="724" y="446" width="76" height="28" rx="14" fill="#dcfce7"/>
    <text x="747" y="466" fill="#15803d" font-size="14" font-weight="700">Open</text>
  </g>
  <text x="146" y="602" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">Ctrl-click toggles rows, Shift-click selects ranges, and delete_selected_rows() removes them.</text>
</svg>
