<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Searchable table example</title>
  <desc id="desc">A CustomTkinter style table with a search box filtering customer rows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf1ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="110" y="72" width="1060" height="576" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="110" y="72" width="1060" height="58" rx="18" fill="#172033"/>
  <text x="150" y="108" fill="#e5eefb" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Search customers</text>
  <rect x="146" y="162" width="988" height="58" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <circle cx="178" cy="191" r="9" fill="none" stroke="#64748b" stroke-width="3"/>
  <path d="M185 198l12 12" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <text x="218" y="198" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">open</text>
  <rect x="146" y="250" width="988" height="310" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <rect x="146" y="250" width="988" height="58" rx="12" fill="#edf3fb"/>
  <text x="184" y="286" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Customer</text>
  <text x="594" y="286" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Status</text>
  <text x="812" y="286" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Owner</text>
  <path d="M550 250v310M772 250v310" stroke="#d9e1ec"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16">
    <rect x="146" y="308" width="988" height="58" fill="#ffffff"/>
    <text x="184" y="344" fill="#172033" font-weight="600">Northwind Components</text>
    <rect x="594" y="324" width="76" height="28" rx="14" fill="#d1fae5"/>
    <text x="617" y="344" fill="#047857" font-size="14" font-weight="700">Open</text>
    <text x="812" y="344" fill="#475569">Amelia</text>
    <rect x="146" y="366" width="988" height="58" fill="#f8fafc"/>
    <text x="184" y="402" fill="#172033" font-weight="600">Blue Ridge Logistics</text>
    <rect x="594" y="382" width="106" height="28" rx="14" fill="#dbeafe"/>
    <text x="615" y="402" fill="#1d4ed8" font-size="14" font-weight="700">In Review</text>
    <text x="812" y="402" fill="#475569">Grace</text>
    <rect x="146" y="424" width="988" height="58" fill="#ffffff"/>
    <text x="184" y="460" fill="#172033" font-weight="600">Aster Digital</text>
    <rect x="594" y="440" width="76" height="28" rx="14" fill="#d1fae5"/>
    <text x="617" y="460" fill="#047857" font-size="14" font-weight="700">Open</text>
    <text x="812" y="460" fill="#475569">Liam</text>
  </g>
  <g stroke="#d9e1ec">
    <path d="M146 308h988M146 366h988M146 424h988M146 482h988"/>
  </g>
  <text x="146" y="608" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">The entry calls table.filter(search.get()) on every key release.</text>
</svg>
