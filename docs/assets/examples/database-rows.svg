<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Database rows example</title>
  <desc id="desc">A database query feeding rows into CTkDataTable through dictionaries or rows_from_cursor.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="86" y="82" width="1108" height="556" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="132" y="146" width="350" height="394" rx="12" fill="#0f172a"/>
  <text x="164" y="188" fill="#c4b5fd" font-family="Cascadia Mono, Consolas, monospace" font-size="15" font-weight="700">database query</text>
  <g font-family="Cascadia Mono, Consolas, monospace" font-size="14">
    <text x="164" y="236" fill="#93c5fd">SELECT</text>
    <text x="230" y="236" fill="#e5eefb">id, name, status</text>
    <text x="164" y="270" fill="#93c5fd">FROM</text>
    <text x="214" y="270" fill="#e5eefb">customers</text>
    <text x="164" y="304" fill="#93c5fd">ORDER BY</text>
    <text x="252" y="304" fill="#e5eefb">name</text>
  </g>
  <rect x="184" y="386" width="246" height="54" rx="8" fill="#172033" stroke="#334155"/>
  <text x="212" y="420" fill="#86efac" font-family="Cascadia Mono, Consolas, monospace" font-size="14">rows_from_cursor()</text>
  <path d="M500 342h122" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
  <path d="M610 328l24 14-24 14" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="654" y="146" width="494" height="394" rx="12" fill="#f8fafc" stroke="#d9e1ec"/>
  <rect x="654" y="146" width="494" height="58" rx="12" fill="#edf3fb"/>
  <text x="690" y="182" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">ID</text>
  <text x="786" y="182" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Name</text>
  <text x="1010" y="182" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Status</text>
  <path d="M754 146v394M972 146v394" stroke="#d9e1ec"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15">
    <rect x="654" y="204" width="494" height="58" fill="#ffffff"/>
    <text x="690" y="240" fill="#475569">1</text>
    <text x="786" y="240" fill="#172033" font-weight="600">Northwind</text>
    <rect x="1010" y="220" width="76" height="28" rx="14" fill="#d1fae5"/>
    <text x="1033" y="240" fill="#047857" font-size="14" font-weight="700">Open</text>
    <rect x="654" y="262" width="494" height="58" fill="#f8fafc"/>
    <text x="690" y="298" fill="#475569">2</text>
    <text x="786" y="298" fill="#172033" font-weight="600">Meridian</text>
    <rect x="1010" y="278" width="78" height="28" rx="14" fill="#e5e7eb"/>
    <text x="1030" y="298" fill="#475569" font-size="14" font-weight="700">Closed</text>
  </g>
  <text x="132" y="590" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="15">SQLite, PostgreSQL, SQLAlchemy, and plain DB-API rows all end as dictionaries in the table.</text>
</svg>
