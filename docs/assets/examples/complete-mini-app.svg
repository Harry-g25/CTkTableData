      <stop offset=".52" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="74" y="64" width="1132" height="592" rx="20" fill="#ffffff" filter="url(#shadow)"/>
